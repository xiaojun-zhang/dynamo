apiVersion: batch/v1
kind: Job
metadata:
  name: eagle-download
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: eagle-download
    spec:
      restartPolicy: Never
      containers:
        - name: eagle-download
          image: python:3.10-slim
          command: ["sh", "-c"]
          envFrom:
            - secretRef:
                name: hf-token-secret
          env:
            - name: MODEL_NAME
              value: nvidia/Kimi-K2.5-Thinking-Eagle3
            - name: MODEL_REVISION
              value: 0b0c6ac039089ad2c2418c91c039553381a302d9
            - name: HF_HOME
              value: /model-store
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          args:
            - |
              set -eux
              pip install --no-cache-dir huggingface_hub hf_transfer
              hf download "$MODEL_NAME" --revision "$MODEL_REVISION"
          volumeMounts:
            - name: model-cache
              mountPath: /model-store
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
